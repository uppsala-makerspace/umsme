<template name="AdminConsole">
    {{#if currentUser}}
        <h1>Force Danalock unlock sync</h1>
        <p class="text-muted">Runs the same sync as the cron job: pulls recent Danalock unlocks into doorunlocks and (if enabled in settings) sends the daily summary email.</p>
        <button class="forceSyncDoorUnlocks btn btn-primary">Sync now</button>

        <h1>Migrate legacy unlocks to doorunlocks</h1>
        <p class="text-muted">Copies every row in the legacy <code>unlocks</code> collection into <code>doorunlocks</code> and then empties <code>unlocks</code>. Re-runnable: rows already in <code>doorunlocks</code> are skipped. Usernames that don't match a member's email are stored in an <code>extid</code> field instead of <code>memberid</code>.</p>
        <button class="migrateUnlocks btn btn-primary">Migrate now</button>

        <h1>Update members with correct dates</h1>
        <button class="updateMembers">Update now!</button>
        <h1>Detect mobile numbers in payments</h1>
        <button class="detectMobiles">Detect now!</button>
        <h1>Update member mobile numbers from payments </h1>
        <button class="updateMobiles">Update now!</button>

        <h1>Accept all current paying members</h1>
        <p class="text-muted">Sets all paying members (not family dependents) as registered. Use this to avoid having to individually accept all existing members.</p>
        <button class="acceptAllMembers btn btn-primary">Accept all</button>

        <h1>Grant mandatory certificate to all members</h1>
        {{#if mandatoryCertificate}}
        <p>Mandatory certificate: <strong>{{mandatoryCertificate.name.sv}}</strong></p>
        <p class="text-muted">Creates attestations for all members in the database who don't have one yet. Uses you as certifier.</p>
        <button class="grantMandatoryToAll btn btn-primary">Grant to all members</button>
        {{else}}
        <p class="text-muted">No mandatory certificate has been configured.</p>
        {{/if}}
    {{/if}}
</template>
