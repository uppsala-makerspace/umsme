<template name="SendMail">
    <h1>Send mail</h1>
    {{#if announcementId}}
    <div class="alert alert-info">Sending from announcement. <a href="/announcement/{{announcementId}}">Back to announcement</a></div>
    {{/if}}
    {{#if Template.subscriptionsReady}}
        {{#if fromOptions}}
          {{#let to=toAsync}}
            {{#let mail=mailAsync}}
              {{#autoForm collection=Mails doc=mail id="insertMailForm" type="normal" validation="keyup"}}
                <fieldset>
                    {{> afQuickField name="from"}}
                    {{> afQuickField name="recipients"}}
                    {{> afQuickField name="family"}}
                    <div class="form-group">
                        <label class="control-label">To ({{to.length}})</label> <a class="btn btn-primary switchManualTo" href="#" role="button">edit</a>
                        {{#if tomanual}}
                          {{#let tosrc=tosrcAsync}}
                            <br><textarea id="manualSendList" class="mailSendList" value="{{tosrc}}"></textarea>
                          {{/let}}
                        {{else}}
                          {{>Recipients value=to}}
                        {{/if}}
                    </div>
                    {{> afQuickField name="subject"}}
                    <div class="form-group" style="margin-bottom: 5px;">
                        <label class="control-label">Format</label>
                        <div class="btn-group" style="margin-left: 10px;">
                            <button type="button" class="btn btn-sm setRaw {{#if isRaw}}btn-primary{{else}}btn-default{{/if}}">Raw</button>
                            <button type="button" class="btn btn-sm setMarkdown {{#if isMarkdown}}btn-primary{{else}}btn-default{{/if}}">Markdown</button>
                            <button type="button" class="btn btn-sm setPlaintext {{#if isPlaintext}}btn-primary{{else}}btn-default{{/if}}">Plain text</button>
                        </div>
                    </div>
                    <div class="row">
                        <div class="{{#if hasPreview}}col-md-6{{else}}col-md-12{{/if}}">
                            {{> afQuickField name="template"}}
                        </div>
                        {{#if hasPreview}}
                        <div class="col-md-6">
                            <label class="control-label">Preview</label>
                            <div class="well" style="min-height: 200px; overflow-y: auto; white-space: pre-wrap;">{{{formatPreview}}}</div>
                        </div>
                        {{/if}}
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                        <button type="reset" class="btn btn-default">Reset</button>
                    </div>
                </fieldset>
              {{/autoForm}}
            {{/let}}
          {{/let}}
        {{/if}}
    {{else}}
        Loading...
    {{/if}}
    <p>
    {{#if message}}
        <div class="alert alert-warning" style="margin-top: 10px" role="alert">
            {{message}}
        </div>
    {{/if}}
    {{#if dontclose}}
        <div class="alert alert-warning" style="margin-top: 10px" role="alert">
            <h2>Don't close or move away, sending mails!</h2>
            <strong>{{dontclose}}</strong>
        </div>
    {{/if}}
    </p>
    {{>MessageTemplateDocumentation}}
</template>
