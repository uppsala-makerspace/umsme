<template name="AnnouncementNew">
    <h1>New announcement</h1>
    {{#autoForm collection=Announcements id="announcementNewForm" omitFields="_id,status,createdAt,sentAt,mailId" type="normal"}}
      {{> afQuickField name="type"}}
      {{> afQuickField name="subjectSv"}}
      {{> afQuickField name="subjectEn"}}
      {{> afQuickField name="bodySv"}}
      {{> afQuickField name="bodyEn"}}
      <div>
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-default cancelNew">Cancel</button>
      </div>
    {{/autoForm}}
    {{> MessageTemplateDocumentation}}
</template>
